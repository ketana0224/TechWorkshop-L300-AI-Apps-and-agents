name: Run Shopper Agent Initializer

on:
  push:
    branches:
      - main
    paths:
      - src/app/agents/shopperAgent_initializer.py
      - src/prompts/ShopperAgentPrompt.txt
      - src/app/tools/aiSearchTools.py
  workflow_dispatch:

jobs:
  run-initializer:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
      gpt_deployment: ${{ secrets.GPT_DEPLOYMENT }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Validate azure.ai.projects import
        run: python -c "from azure.ai.projects import AIProjectClient"

      - name: Run shopper agent initializer
        run: python src/app/agents/shopperAgent_initializer.py