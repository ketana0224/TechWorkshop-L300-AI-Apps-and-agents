name: Run Shopper Agent Initializer

on:
  push:
    branches:
      - main
    paths:
      - src/app/agents/shopperAgent_initializer.py
      - src/prompts/ShopperAgentPrompt.txt
      - src/app/tools/aiSearchTools.py
  workflow_dispatch:

jobs:
  run-initializer:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: 'echo "$ENV" > src/.env'
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Validate azure.ai.projects import
        run: python -c "from azure.ai.projects import AIProjectClient"

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run shopper agent initializer
        run: |
          cd src/
          python app/agents/shopperAgent_initializer.py