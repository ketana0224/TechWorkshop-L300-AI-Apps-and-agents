name: Build and Push src Image to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create temporary .env from secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ENV }}" ]; then
            echo "Required secret ENV is empty."
            exit 1
          fi
          printf '%s' "${{ secrets.ENV }}" > ./src/.env

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve image name
        id: image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="chat-app"
          echo "value=${ACR_LOGIN_SERVER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.value }}:latest
            ${{ steps.image.outputs.value }}:${{ github.sha }}

      - name: Remove temporary .env
        if: always()
        shell: bash
        run: rm -f ./src/.env
