name: Build and Push src Image to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create temporary .env from secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ENV }}" ]; then
            echo "Required secret ENV is empty."
            exit 1
          fi
          printf '%s' "${{ secrets.ENV }}" > ./src/.env

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ endsWith(secrets.AZURE_CONTAINER_REGISTRY, '.azurecr.io') && secrets.AZURE_CONTAINER_REGISTRY || format('{0}.azurecr.io', secrets.AZURE_CONTAINER_REGISTRY) }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Resolve image name
        id: image
        env:
          AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_HOST="$AZURE_CONTAINER_REGISTRY"
          if [[ "$REGISTRY_HOST" != *.azurecr.io ]]; then
            REGISTRY_HOST="${REGISTRY_HOST}.azurecr.io"
          fi
          IMAGE_NAME="chat-app"
          echo "value=${REGISTRY_HOST}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.value }}:latest
            ${{ steps.image.outputs.value }}:${{ github.sha }}

      - name: Remove temporary .env
        if: always()
        shell: bash
        run: rm -f ./src/.env
